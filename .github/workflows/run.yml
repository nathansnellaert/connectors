name: Run Connector
run-name: "${{ inputs.slug }} :: ${{ inputs.run_id }}"

on:
  workflow_dispatch:
    inputs:
      slug:
        description: Connector directory under the repo root
        required: true
        type: string
      run_id:
        description: Harness run id (groups self-retrigger continuations)
        required: false
        type: string
      dag_target:
        description: Restrict the DAG to this node kind (e.g. transform)
        required: false
        type: string
      dag_on_failure:
        description: "crash | continue"
        required: false
        type: string
        default: continue

concurrency:
  group: run-${{ inputs.slug }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Run connector
        working-directory: ${{ inputs.slug }}
        run: |
          uv sync
          uv run python -m src.subsets_utils.runner
        env:
          PYTHONUNBUFFERED: "1"
          CI: "true"
          CONNECTOR_NAME: ${{ inputs.slug }}
          RUN_ID: ${{ inputs.run_id }}
          DAG_TARGET: ${{ inputs.dag_target }}
          DAG_ON_FAILURE: ${{ inputs.dag_on_failure }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          GH_RETRIGGER_PAT: ${{ secrets.GH_RETRIGGER_PAT }}
